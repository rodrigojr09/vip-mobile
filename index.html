<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Checklist Final</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            color: #000;
            padding: 20px;
        }

        .pergunta {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .label {
            font-size: 18px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .respostas {
            font-size: 16px;
        }

        .marcado {
            color: green;
        }

        .status-Sim {
            color: green;
        }

        .status-Não {
            color: red;
        }

        .status-N/A {
            color: gray;
        }
    </style>
</head>

<body>
    <h1>Checklist da Visita</h1>

    <div class="pergunta">
        <p class="label">
            Existe Sinalização de Segurança?
            <span class="status-Sim">Sim</span>
        </p>

        <div class="pergunta">
            <p class="label">
                A sinalização de segurança está visível e compreensível?
                <span class="status-Não">Não</span>
            </p>

            <div class="pergunta">
                <p class="label">
                    As placas precisam ser substituídas ou reforçadas?
                    <span class="status-N/A">N/A</span>
                </p>
                <p>Jshshhshshs</p>
            </div>
        </div>
    </div><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
</body>

</html>
